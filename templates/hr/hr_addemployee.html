    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background"></div>
    <div class="dashboard-viewport">
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                </div>
            </div>
                <ul class="menu">
        <li><a href="hr_dash.html" class="menu-item"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
        <li><a href="hr_profile_view.html" class="menu-item"><i class="fas fa-user"></i><span>Profile</span></a></li>
        <hr>
        <li><a href="hr_appmanagement.html" class="menu-item"><i class="fas fa-file"></i><span>Application Management</span></a></li>
        <li><a href="hr_employeelist.html" class="menu-item active"><i class="fas fa-database"></i><span>Employee Records</span></a></li>

        <li><a href="#" class="menu-item"><i class="fas fa-star"></i><span>Performance Evaluation</span></a></li>
        <li><a href="hr_training.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Trainings</span></a></li>
        <li><a href="hr_reports.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Reports / Analytics</span></a></li>
    </ul>
        </div>

        <main class="main-content">
            <div class="content-card">
                <h1>Add New Employee</h1>
                
                <div class="form-body">
                    <form class="form-grid" id="addEmployeeForm" method="POST" enctype="multipart/form-data">
                        
                        <section class="form-section-box">
                            <div class="section-header">Basic Information</div>
                            <div class="section-body">
                                <div class="photo-container">
                                    <div class="photo-circle">
                                        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                    </div>
                                    <label for="id_profile_pic" class="photo-label">Upload Photo (Optional)</label>
                                    <input type="file" name="profile_pic" id="id_profile_pic" style="display:none;">
                                </div>

                                <div class="inputs-row">
                                    <div class="input-item">
                                        <label>Username</label>
                                        <input type="text" name="username" class="form-control" required>
                                    </div>
                                    <div class="input-item">
                                        <label>First Name</label>
                                        <input type="text" name="first_name" class="form-control" required>
                                    </div>
                                    <div class="input-item">
                                        <label>Last Name</label>
                                        <input type="text" name="last_name" class="form-control" required>
                                    </div>
                                    <div class="input-item">
                                        <label>Employment I.D</label>
                                        <input type="text" name="employee_id" class="form-control" required>
                                    </div>
                                    <div class="input-item">
                                        <label>Employment Type</label>
                                        <select name="employment_type" class="form-control" required>
                                            <option value="">Select type</option>
                                            <option value="Full-time">Full-time</option>
                                            <option value="Part-time">Part-time</option>
                                            <option value="Contractual">Contractual</option>
                                            <option value="Probationary">Probationary</option>
                                        </select>
                                    </div>
                                    <div class="input-item">
                                        <label>Date Hired</label>
                                        <input type="date" name="date_hired" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section-box">
                            <div class="section-header">Personal Information</div>
                            <div class="section-body">
                                <div class="full-width-item">
                                    <label>Email Address</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                                <div class="full-width-item">
                                    <label>Contact Number</label>
                                    <input type="text" name="contact_number" class="form-control">
                                </div>
                                <div class="full-width-item">
                                    <label>Home Address</label>
                                    <input type="text" name="address" class="form-control">
                                </div>

                                <h4 class="sub-header">Emergency Contact</h4>
                                <div class="inputs-row">
                                    <div class="input-item">
                                        <label>Contact Name</label>
                                        <input type="text" name="emergency_contact_name" class="form-control">
                                    </div>
                                    <div class="input-item">
                                        <label>Contact Number</label>
                                        <input type="text" name="emergency_contact_num" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </section>

                        <div class="form-footer">
                            <button type="button" class="btn btn-cancel" onclick="history.back()">Cancel</button>
                            <button type="submit" class="btn btn-save">Save Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
