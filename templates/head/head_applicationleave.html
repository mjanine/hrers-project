<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for Leave | Head System</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/head/head_applicationleave.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                    <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
                </div>
                <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
            </div>

            <ul class="menu">
                <li><a href="head_dash.html" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
                <li><a href="head_profile_view.html" class="menu-item"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <hr>
                <li>
                <a href="head_appmanagement.html" class="menu-item">
                    <i class="fas fa-file"></i>
                    <span>Application Management</span>
                </a>
            </li>
            <li>
                <a href="head_employeelist.html" class="menu-item">
                    <i class="fas fa-database"></i>
                    <span>Employee Records</span>
                </a>
            </li>
            <li>
                <a href="head_attendancemonitoring.html" class="menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>Attendance Monitoring</span>
                </a>
            </li>
            <li>
                <a href="head_leaveselect.html" class="menu-item active">
                    <i class="fas fa-briefcase"></i>
                    <span>Leave Management</span>
                </a>
            </li>
            <li><a href="#" class="menu-item"><i class="fas fa-star"></i> <span>Performance Evaluation</span></a></li>
            <li><a href="head_training.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Trainings</span></a></li>
            </ul>

            <div class="bottom-section">
                <a href="../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
            </div>
        </div>

        <main class="main-content">
            <div class="leave-card">
                <h1>Leave Management</h1>
                
                <div class="form-body">
                    <form id="leaveRequestForm">
                        <label class="section-label">Select Leave</label>
                        <div class="leave-type-grid">
                            <button type="button" class="type-btn active">Sick Leave</button>
                            <button type="button" class="type-btn">Emergency Leave</button>
                            <button type="button" class="type-btn">Vacation Leave</button>
                            <button type="button" class="type-btn">Personal Leave</button>
                            <button type="button" class="type-btn">Maternity Leave</button>
                            <button type="button" class="type-btn">Bereavement Leave</button>
                        </div>

                        <div class="date-container">
                            <div class="input-group">
                                <label>Start Date</label>
                                <input type="date" name="start_date" class="form-input" required>
                            </div>
                            <div class="input-group">
                                <label>End Date</label>
                                <input type="date" name="end_date" class="form-input" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Reason for Leave</label>
                            <textarea class="form-textarea" placeholder="Please brief reason for your leave request..." required></textarea>
                        </div>

                        <label class="section-label">Attach Supporting Document(s)</label>
                        <div class="drop-zone" id="dropZone">
                            <input type="file" id="fileInput" hidden>
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Drag and Drop or <span>browse files</span></p>
                            <small>PDF, JPG, PNG - Max 10MB each</small>
                        </div>
                    </form>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="window.location.href='head_leaveselect.html'">Cancel</button>
                    <button type="submit" form="leaveRequestForm" class="btn-primary">Submit Request</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../static/js/head/head_applicationleave.js"></script>
</body>
</html>
