<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit My Profile | Head Department</title> 
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/head/head_profile_edit.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="background"></div>

    <div class="dashboard-viewport">
        <div class="sidebar" id="sidebar">
            <div class="top-section">
                <div class="logo-wrapper" id="logoToggle">
                    <img src="../../static/img/general/uph.png" class="logo">
                    <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
                </div>
                <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
            </div>

            <ul class="menu">
                <li><a href="head_dash.html" class="menu-item"><i class="fas fa-border-all"></i> <span>Dashboard</span></a></li>
                <li><a href="head_profile_view.html" class="menu-item active"><i class="fas fa-user"></i> <span>Profile</span></a></li>
                <hr>
            <li>
                <a href="head_appmanagement.html" class="menu-item">
                    <i class="fas fa-file"></i>
                    <span>Application Management</span>
                </a>
            </li>                
            <li>
                <a href="head_employeelist.html" class="menu-item">
                    <i class="fas fa-database"></i>
                    <span>Employee Records</span>
                </a>
            </li>
                <li>
                <a href="head_attendancemonitoring.html" class="menu-item">
                    <i class="fas fa-calendar"></i>
                    <span>Attendance Monitoring</span>
                </a>
            </li>
            <li>
                <a href="head_leaveselect.html" class="menu-item">
                    <i class="fas fa-briefcase"></i>
                    <span>Leave Management</span>
                </a>
            </li>
                <li><a href="#" class="menu-item"><i class="fas fa-star"></i> <span>Performance Evaluation</span></a></li>
                <li><a href="head_training.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i><span>Trainings</span></a></li>
            </ul>

            <div class="bottom-section">
                <a href="../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
            </div>
        </div>

        <main class="main-content">
            <div class="content-card">
                <h1>Edit My Profile</h1>
                
                <div class="form-body">
                    <form class="form-grid" id="editHeadForm">
                        <section class="form-section-box">
                            <div class="section-header">Basic Information</div>
                            <div class="section-body">
                                <div class="photo-container">
                                    <div class="photo-circle">
                                        <img id="displayPhoto" src="../../static/img/sample-profile-pic.jfif">
                                    </div>
                                    <span class="photo-label">Contact HR to update photo</span>
                                </div>

                                <div class="inputs-row">
                                    <div class="input-item"><label>First Name</label><input type="text" value="Jane" readonly></div>
                                    <div class="input-item"><label>Last Name</label><input type="text" value="Smith" readonly></div>
                                    <div class="input-item"><label>Employment I.D</label><input type="text" value="EMP-H001" readonly></div>
                                    <div class="input-item"><label>Employment Status</label><input type="text" value="Active" readonly></div>
                                    <div class="input-item"><label>Employment Type</label><input type="text" value="Full-time" readonly></div>
                                    <div class="input-item"><label>Department</label><input type="text" value="Computer Department" readonly></div>
                                    <div class="input-item"><label>Position</label><input type="text" value="Department Head" readonly></div>
                                    <div class="input-item"><label>Date Hired</label><input type="text" value="June 01, 2020" readonly></div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section-box">
                            <div class="section-header">Personal Information</div>
                            <div class="section-body">
                                <div class="full-width-item"><label>Email Address</label><input type="email" id="email" value="jane.smith@email.com"></div>
                                <div class="full-width-item"><label>Contact Number</label><input type="text" id="contact" value="+63 917 555 9999"></div>
                                <div class="full-width-item"><label>Address</label><input type="text" id="address" value="Manila, Philippines"></div>
                                
                                <h4 class="sub-header">Emergency Contact</h4>
                                <div class="inputs-row">
                                    <div class="input-item"><label>Contact Name</label><input type="text" id="emergencyName" value="John Smith"></div>
                                    <div class="input-item"><label>Contact Number</label><input type="text" id="emergencyPhone" value="+63 912 345 6789"></div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn btn-cancel" onclick="cancelEdit()">Cancel</button>
                    <button type="button" class="btn btn-save" onclick="updateHead()">Update Changes</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../../static/js/head/head_profile_edit.js"></script>
</body>
</html>
