<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Records | SD System</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/sd/sd_employeelist.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Ensures the action icon is perfectly centered */
        .action-cell {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="background"></div>

<div class="dashboard-viewport">
    <div class="sidebar" id="sidebar">
        <div class="top-section">
            <div class="logo-wrapper" id="logoToggle">
                <img src="../../static/img/general/uph.png" class="logo">
                <div class="open-icon"><i class="fas fa-chevron-right"></i></div>
            </div>
            <button class="close-btn" id="closeBtn"><i class="fas fa-chevron-left"></i></button>
        </div>
        <ul class="menu">
            <li><a href="sd_dash.html" class="menu-item"><i class="fas fa-border-all"></i><span>Dashboard</span></a></li>
            <li><a href="sd_profile_view.html" class="menu-item"><i class="fas fa-user"></i><span>Profile</span></a></li>
            <hr>
            <li><a href="sd_appmanagement.html" class="menu-item"><i class="fas fa-file"></i><span>Application Management</span></a></li>
            <li><a href="sd_employeelist.html" class="menu-item active"><i class="fas fa-database"></i><span>Employee Records</span></a></li>
            <li><a href="sd_attendancemonitoring.html" class="menu-item"><i class="fas fa-calendar"></i><span>Attendance Monitoring</span></a></li>
            <li><a href="sd_leaveselect.html" class="menu-item"><i class="fas fa-briefcase"></i><span>Leave Management</span></a></li>
            <li><a href="#" class="menu-item"><i class="fas fa-star"></i><span>Performance Evaluation</span></a></li>
            <li><a href="sd_reports.html" class="menu-item"><i class="fas fa-chart-line"></i><span>Reports / Analytics</span></a></li>
        </ul>
        <div class="bottom-section">
            <a href="../../login/login.html" class="menu-item logout"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></a>
        </div>
    </div>

    <main class="main-content">
        <div class="leave-card">
            <div class="header">
                <h1>Employee Records</h1>
                <div class="search-add">
                    <input type="text" id="searchInput" placeholder="Search by Name / ID / Dept / Position">
                </div>
            </div>
            
            <div class="form-body">
                <table id="employeeTable">
                    <thead>
                        <tr>
                            <th>Employee ID</th>
                            <th>Full Name</th>
                            <th>Department</th>
                            <th>
                                Position
                                <select id="filterPosition" class="table-filter">
                                    <option value="">All</option>
                                    <option value="HR">HR</option>
                                    <option value="Admin Staff">Admin Staff</option>
                                    <option value="Instructor">Instructor</option>
                                    <option value="School Director">School Director</option>
                                    <option value="Dean">Dean</option>
                                    <option value="Head">Head</option>
                                </select>
                            </th>
                            <th>
                                Status
                                <select id="filterStatus" class="table-filter">
                                    <option value="">All</option>
                                    <option value="Active">Active</option>
                                    <option value="Inactive">Inactive</option>
                                </select>
                            </th>
                            <th style="text-align: center;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeTableBody">
                        <tr>
                            <td>HEAD-001</td>
                            <td>John Head</td>
                            <td>Administration</td>
                            <td>Head</td>
                            <td>Active</td>
                            <td class="action-cell">
                                <a href="../sd/sd_employee_view.html" class="action-link" title="View"><i class="fas fa-eye"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="../../static/js/sd/sd_employeelist.js"></script>
</body>
</html>
