<!DOCTYPE html>
<html>
<head>
    <title>UPHSD Log-in</title>
    <link rel="shortcut icon" type="image/png" href="/static/img/general/uph.png">
    <link rel="stylesheet" href="/static/css/login/login.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
     <div class="container">
        <div class="left">
            <img src="/static/img/general/uph.png" alt="UPHSD logo" class="logo" width="250" height="250">
            
            <form method="post" action="#">

                <input type="text" name="username" placeholder="Username/Email" required>
                <input type="password" name="password" placeholder="Password" required>
                
                <div class="remember-forgot">
                    <label><input type="checkbox" name="remember_me"> Remember me</label>
                    <a href="forpass.html">Forgot your password?</a>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
        <div class="right-wrapper">
            <div class="right"></div>
        </div>
    </div>

    </body>
</html>
