<!DOCTYPE html>
<html>
<head>
    <title>UPHSD Forgot Password</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/login/forpass.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div class="logo">
        <img src="../../static/img/general/uph.png" alt="Logo">
    </div>

    <div class="container">
        
        <div class="left-section">
            <img src="../../static/img/login/forpass.jpg">
        </div>

        <div class="right-section">
            <h2>FORGOT PASSWORD?</h2>
            <p>Enter your registered email address. We'll send your password to your email.</p>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email">
            </div>

            <button id="sendBtn">Send Email</button>

            <div class="message" id="message"></div>

            <a class="back-login" href="../../templates/login/login.html">Back to login</a>
        </div>

    </div>
    <script src='../../static/js/login/forpass.js'></script>
</body>
</html>
