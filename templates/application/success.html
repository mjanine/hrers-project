<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted Successfully - UPHSD Molino</title>
    <link rel="shortcut icon" type="image/png" href="../../static/img/general/uph.png">
    <link rel="stylesheet" href="../../static/css/application/success.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <main class="success-container">
        <!-- Background with dark gradient overlay -->
        <div class="background-wrapper">
            <div class="background-image"></div>
            <div class="overlay"></div>
        </div>

        <!-- Success Content -->
        <div class="success-content">
            <!-- Logo -->
            <div class="logo-section">
                <img src="../../static/img/general/perpetual-logo.png" alt="UPHSD Molino" class="logo">
            </div>

            <!-- Success Icon -->
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <!-- Main Message -->
            <h1 class="main-heading">Thank You for Applying</h1>

            <!-- Subtitle -->
            <p class="subtitle">Your application has been successfully submitted. We will review it and get back to you soon.</p>

            <!-- Action Buttons -->
            <div class="cta-container">
                <a href="welcomepage.html" class="cta-button primary-btn">
                    <span class="btn-text">Back to Home</span>
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <a href="application_info.html" class="cta-button secondary-btn">
                    <span class="btn-text">Submit Another Application</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </a>
            </div>
        </div>
    </main>

    <script>
        // Optional: Redirect after delay
        // Uncomment the following lines to auto-redirect after 5 seconds
        // setTimeout(() => {
        //     window.location.href = 'welcomepage.html';
        // }, 5000);
    </script>
</body>
</html>
