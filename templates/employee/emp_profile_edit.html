</head>

            <div class="bottom-section">
    <a href="../login/login.html"
       class="menu-item logout"

        <span>Log Out</span>

        </div>

        <main class="main-content">
            <div class="content-card">
                <h1>Edit My Profile</h1>
                
                <div class="form-body">
                    <form class="form-grid" id="editEmployeeForm">
                        <section class="form-section-box">
                            <div class="section-header">Basic Information</div>
                            <div class="section-body">
                                <div class="photo-container">
                                    <div class="photo-circle">
                                        <img id="displayPhoto" src="../../static/img/sample-profile-pic.jfif">
                                    </div>
                                    <span class="photo-label">Contact HR to update photo</span>
                                </div>

                                <div class="inputs-row">
                                    <div class="input-item"><label>First Name</label><input type="text" id="firstName" value="John" readonly></div>
                                    <div class="input-item"><label>Last Name</label><input type="text" id="lastName" value="Doe" readonly></div>
                                    <div class="input-item"><label>Employment I.D</label><input type="text" id="empID" value="EMP-2024-001" readonly></div>
                                    <div class="input-item"><label>Employment Status</label><input type="text" id="empStatus" value="Active" readonly></div>
                                    <div class="input-item"><label>Employment Type</label><input type="text" id="empType" value="Full-Time" readonly></div>
                                    <div class="input-item"><label>Department / Office</label><input type="text" id="dept" value="College of Computer Studies" readonly></div>
                                    <div class="input-item"><label>Position/Rank</label><input type="text" id="pos" value="Instructor I" readonly></div>
                                    <div class="input-item"><label>Date Hired</label><input type="text" id="dateHired" value="August 15, 2022" readonly></div>
                                </div>
                            </div>
                        </section>

                        <section class="form-section-box">
                            <div class="section-header">Personal Information</div>
                            <div class="section-body">
                                <div class="full-width-item"><label>Email Address</label><input type="email" id="email" value="john.doe@email.com"></div>
                                <div class="full-width-item"><label>Contact Number</label><input type="text" id="contact" value="+63 912 345 6789"></div>
                                <div class="full-width-item"><label>Address</label><input type="text" id="address" value="123 Maligaya St., Las Piñas City, Metro Manila"></div>
                                
                                <h4 class="sub-header">Emergency Contact</h4>
                                <div class="inputs-row">
                                    <div class="input-item"><label>Contact Name</label><input type="text" id="emergencyName" value="Jane Smith Doe"></div>
                                    <div class="input-item"><label>Contact Number</label><input type="text" id="emergencyPhone" value="+63 998 765 4321"></div>
                                </div>
                            </div>
                        </section>
                    </form>
                </div>

                <div class="form-footer">
    <button type="button" class="btn btn-cancel" onclick="cancelEEdit()">Cancel</button>
    
    <button type="button" class="btn btn-save" onclick="updateEProfile()">Update Changes</button>
</div>
            </div>
        </main>
    </div>

    <script src="../../static/js/employee/emp_profile_edit.js"></script>
</body>
</html>
