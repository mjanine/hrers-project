<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Employee Portal</title>
    <link rel="shortcut icon" type="image/png" href="/static/img/general/uph.png">
    <link rel="stylesheet" href="/static/css/login/changepass.css">
</head>
<body>
    <div class="glass-container">
        <div class="logo">
            <img src="/static/img/general/uph.png" alt="Employee Portal logo" width="120" height="120">
        </div>
        <div class="content">
            <h2>Update Your Password</h2>
            <p class="intro">Create a new password to continue.</p>
            
            <form id="changePasswordForm" action="#" method="post" novalidate>
                <div class="input-group">
                    <input type="password" id="currentPassword" name="currentPassword" placeholder="Current password" required>
                </div>

                <div class="input-group">
                    <input type="password" id="newPassword" name="newPassword" placeholder="New password" required minlength="8">
                </div>

                <div class="input-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="8">
                </div>

                <div class="requirements invalid" id="passwordError" style="display: none; margin-bottom: 10px;"></div>
                <button type="submit">Update Password</button>
            </form>

            <div class="requirements">
                <p class="note">Ensure your new password is at least 8 characters long.</p>
            </div>
        </div>
    </div>

    <script src="/static/js/login/changepass.js" defer></script>
</body>
</html>
